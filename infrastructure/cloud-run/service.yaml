apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: velunee-api
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '10'
        run.googleapis.com/cpu-throttling: 'true'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/velunee/api:COMMIT_SHA
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '4000'
            - name: AUTH_MODE
              value: required
            - name: AI_PROVIDER
              value: gemini
          resources:
            limits:
              cpu: '1'
              memory: 512Mi
