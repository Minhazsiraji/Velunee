services:
  postgres:
    image: postgres:17-alpine
    container_name: velunee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: velunee
      POSTGRES_USER: velunee
      POSTGRES_PASSWORD: velunee
    ports:
      - '5432:5432'
    volumes:
      - velunee-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U velunee -d velunee']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: velunee-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - velunee-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  velunee-postgres-data:
  velunee-redis-data:
